name: Pytest

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.x"]

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[test]
        sudo apt update
        sudo apt install dvipng texlive-latex-extra texlive-fonts-recommended cm-super
        sudo apt install fonts-noto-cjk
    - name: Add permission to script(s)
        sudo chmod +x ci/run_unix_test_loop.sh
    - name: Test with pytest via wrapper that matrix-tests specific Matplotlib versions
      run: |
        ./ci/run_unix_test_loop.sh
